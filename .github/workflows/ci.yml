name: AssetFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # Backend Checks
  # ============================================================
  backend:
    name: Backend — Lint, Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build verification
        run: npm run build
        env:
          # Use a dummy secret for build-time — real secrets injected at runtime
          JWT_SECRET: ci_dummy_secret_that_is_long_enough_to_pass_validation_32chars

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Report but don't block on transitive deps

  # ============================================================
  # Frontend Checks
  # ============================================================
  frontend:
    name: Frontend — Lint, Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ============================================================
  # Security Scanning
  # ============================================================
  security:
    name: Security — Secrets & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for accidentally committed secrets
        run: |
          # Fail if .env files with real values are found (not .env.example)
          if grep -r "JWT_SECRET=assetflow_jwt" . --include="*.env" 2>/dev/null; then
            echo "ERROR: Weak default JWT secret found in a .env file!"
            exit 1
          fi
          if find . -name ".env" -not -name ".env.example" -not -path "*/.git/*" | grep -q .; then
            echo "WARNING: .env file found in repository. Verify it is in .gitignore."
          fi
          echo "Secret scan passed."
